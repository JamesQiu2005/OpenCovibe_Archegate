<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArcheCovibe</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #10181f;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      :root:not(.dark) #app-splash {
        background: #f7fafc;
      }
      #app-splash img {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
      }
      #app-splash .spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid #2a3b49;
        border-top-color: #5b8fe4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      :root:not(.dark) #app-splash .spinner {
        border-color: #d5e0e8;
        border-top-color: #2b65c5;
      }
      #app-splash .hint {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif;
        font-size: 13px;
        color: #96a5b3;
      }
      :root:not(.dark) #app-splash .hint {
        color: #657482;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-splash">
      <img src="/logo.png" alt="ArcheCovibe" />
      <div class="spinner"></div>
      <div class="hint">Initializing...</div>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
